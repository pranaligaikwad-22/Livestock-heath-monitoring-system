name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r catle/requirements.txt

    - name: Check Python Syntax
      run: |
        python -m py_compile catle/app.py

    - name: CI Completed
      run: echo "CI Pipeline Successful"
